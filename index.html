<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Desafío Toallín!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #ui {
            text-align: center;
            margin-bottom: 10px;
            z-index: 10;
        }
        h1 { margin: 5px 0; font-size: 26px; color: #00fff0; text-shadow: 0 0 10px #00fff0; }
        .stats { font-size: 20px; font-weight: bold; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; }
        #game-container {
            position: relative;
            width: 85vw;
            max-width: 360px;
            height: 55vh;
            background: radial-gradient(circle, #243b55, #141e30);
            border: 4px solid #00fff0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 240, 0.5);
        }
        
        /* TOALLÍN HECHO CON CÓDIGO (NUNCA FALLA) */
        #target {
            position: absolute;
            width: 70px;
            height: 95px;
            background-color: #a0c4ff;
            border: 3px solid #ffffff;
            border-radius: 8px;
            box-shadow: inset 0 15px 0 #ffffff, inset 0 -15px 0 #ffffff, 0 4px 10px rgba(0,0,0,0.5);
            cursor: pointer;
            display: none;
        }
        /* Ojos de Toallín */
        #target::before {
            content: '👀';
            position: absolute;
            top: 25px;
            left: 15px;
            font-size: 24px;
        }
        /* Boca de Toallín */
        #target::after {
            content: '💵';
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 22px;
        }

        #start-btn {
            padding: 15px 35px;
            font-size: 20px;
            font-weight: bold;
            background: #ff007f;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff007f;
            margin-top: 20px;
        }
        #victory-screen {
            display: none;
            text-align: center;
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            top: 0; left: 0; width: 100%; height: 100%;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            z-index: 20;
        }

            color: #ffea00;
            font-size: 16px;
            margin-top: 15px;
