<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Toallín Recolector!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #ui {
            text-align: center;
            margin-bottom: 10px;
        }
        h1 { margin: 5px 0; font-size: 24px; color: #ffea00; }
        .stats { font-size: 18px; font-weight: bold; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; }
        
        #game-container {
            position: relative;
            width: 320px;
            height: 400px;
            background: #243b55;
            border: 4px solid #ffea00;
            border-radius: 15px;
            overflow: hidden;
        }
        
        #player {
            position: absolute;
            bottom: 10px;
            left: 130px;
            width: 60px; 
            height: 60px;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .money {
            position: absolute;
            width: 35px;
            height: 35px;
            font-size: 30px;
        }

        #controls {
            display: flex;
            justify-content: space-between;
            width: 320px;
            margin-top: 15px;
            gap: 20px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            background: #00fff0;
            color: black;
            border: none;
            border-radius: 12px;
            text-align: center;
        }

        #start-btn {
            padding: 15px 35px;
            font-size: 20px;
            font-weight: bold;
            background: #ff007f;
            color: white;
            border: none;
            border-radius: 30px;
            margin-top: 15px;
        }

        #victory-screen {
            display: none;
            text-align: center;
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            top: 0; left: 0; width: 100%; height: 100%;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>🏃‍♂️ ¡Toallín al Rescate! 💵</h1>
        <p style="margin: 3px 0; font-size: 14px;">¡Mové a Toallín y atrapá los billetes!</p>
        <div class="stats">💰 Juntado: <span id="score">0</span> | ⏱️ <span id="timer">30</span>s</div>
    </div>

    <div id="game-container">
        <div id="player">🧽</div>
        <div id="victory-screen">
            <h1 style="color: #ffea00; font-size: 28px;">¡TIEMPO AGOTADO!</h1>
            <p style="font-size: 18px;">Lograste recolectar:</p>
            <h2 id="final-score" style="font-size: 45px; color: #00fff0; margin: 10px 0;">$0</h2>
            <p style="color: #ffea00; font-size: 14px;">📸 ¡Sacá CAPTURA y mandala al grupo! 📸</p>
            <button onclick="resetGame()" style="padding: 10px 20px; background: #ff007f; color: white; border-radius: 20px; border: none; font-weight: bold;">Volver a intentar</button>
        </div>
    </div>

    <button id="start-btn" onclick="startGame()">¡INICIAR JUEGO!</button>

    <div id="controls">
        <button class="btn" id="left-btn">◀️ Izq</button>
        <button class="btn" id="right-btn">Der ▶️</button>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let playerX = 130;
        const playerSpeed = 30;
        
        let moneyInterval;
        let countdownInterval;

        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('start-btn');
        const victoryScreen = document.getElementById('victory-screen');
        const finalScoreDisplay = document.getElementById('final-score');

        function moveLeft() {
            if (!gameActive) return;
            playerX = Math.max(0, playerX - playerSpeed);
            player.style.left = playerX + 'px';
        }

        function moveRight() {
            if (!gameActive) return;
            playerX = Math.min(260, playerX + playerSpeed);
            player.style.left = playerX + 'px';
        }

        document.getElementById('left-btn').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); });
        document.getElementById('right-btn').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); });
        document.getElementById('left-btn').addEventListener('mousedown', moveLeft);
        document.getElementById('right-btn').addEventListener('mousedown', moveRight);

        function createMoney() {
            if (!gameActive) return;
